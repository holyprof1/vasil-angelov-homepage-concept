<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vasil Angelov - Soulful. Cinematic. Unforgettable.</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header Navigation -->
    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <span class="monogram">VA</span>
            </div>
            
            <nav class="desktop-nav">
                <a href="#biography">Biography</a>
                <a href="#live-gigs">Live Gigs</a>
                <a href="#band">Band</a>
                <a href="#aura">AURA</a>
                <a href="#music">Music</a>
                <a href="#contact">Contact</a>
            </nav>

            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <!-- Mobile Menu -->
        <div class="mobile-menu" id="mobileMenu">
            <nav class="mobile-nav">
                <a href="#biography">Biography</a>
                <a href="#live-gigs">Live Gigs</a>
                <a href="#band">Band</a>
                <a href="#aura">AURA</a>
                <a href="#music">Music</a>
                <a href="#contact">Contact</a>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero-section">
        <div class="hero-container">
            <!-- Left Panel - Content -->
            <div class="hero-content">
                <div class="content-wrapper">
                    <div class="hero-text">
                        <h1 class="artist-name">
                            <span class="name-line">VASIL</span>
                            <span class="name-line">ANGELOV</span>
                        </h1>
                        <p class="tagline">Soulful. Cinematic. Unforgettable.</p>
                        <a href="#music" class="cta-button">
                            <span>EXPLORE MUSIC</span>
                            <svg class="arrow-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                                <path d="M4 10H16M16 10L11 5M16 10L11 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </a>
                    </div>

                    <!-- Decorative Element -->
                    <div class="decorative-line"></div>
                </div>
            </div>

            <!-- Right Panel - Image -->
            <div class="hero-image">
                <div class="image-overlay"></div>
                <div class="image-container">
                    <!-- Placeholder for artist image -->
                    <div class="artist-photo"></div>
                </div>
                
                <!-- Geometric Accent -->
                <svg class="geometric-accent" width="300" height="300" viewBox="0 0 300 300" fill="none">
                    <path d="M50 150 Q100 50, 150 100 T250 150" stroke="#D4AF37" stroke-width="1" opacity="0.15"/>
                    <circle cx="150" cy="150" r="80" stroke="#D4AF37" stroke-width="0.5" opacity="0.1" fill="none"/>
                </svg>
            </div>

            <!-- Vertical Divider -->
            <div class="vertical-divider"></div>
        </div>

        <!-- Scroll Indicator -->
        <div class="scroll-indicator">
            <div class="scroll-arrow">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M12 5V19M12 19L19 12M12 19L5 12" stroke="#D4AF37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <span>Scroll</span>
        </div>
    </section>

    <!-- Audio Waveform Indicator (Optional) -->
    <div class="audio-indicator">
        <div class="waveform">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
